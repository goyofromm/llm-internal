version: "3.9"

services:
  chroma:
    image: chromadb/chroma:0.4.24
    container_name: chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  api:
    build: .
    container_name: backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - APP_API_KEY=${APP_API_KEY}
      - DOCS_PATH=/data/docs
    volumes:
      - ./docs:/data/docs
    depends_on:
      - chroma

volumes:
  chroma_data: